name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Build ReactLynx Bundle
      run: npm run build

    - name: Copy Bundle to Android Assets
      run: |
        mkdir -p android/app/src/main/assets
        cp dist/main.lynx.bundle android/app/src/main/assets/main.lynx.bundle

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5

    - name: Build APK with Gradle
      run: |
        cd android
        gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TaniPlus-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
